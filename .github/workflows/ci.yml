name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [chrome, firefox]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.5.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build
        run: |
          if [ "${{ matrix.target }}" = "firefox" ]; then
            pnpm build:firefox
          else
            pnpm build
          fi
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: extension-${{ matrix.target }}
          path: .output/${{ matrix.target == 'firefox' && 'firefox-mv3' || 'chrome-mv3' }}

  smoke:
    name: smoke (Innertube search + matcher)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.5.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:smoke

  e2e:
    name: e2e (headless Chromium)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.5.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright Chromium + xvfb
        # Ubuntu's apt `chromium-browser` package is a snap stub that doesn't
        # run in containers, and Playwright already ships a working Chromium
        # we can reuse. xvfb is a standard apt package though.
        run: |
          pnpm exec playwright install --with-deps chromium
          sudo apt-get install -y xvfb
      - name: Run e2e (headed under xvfb)
        # YT Music renders a deprecated-browser splash + skips the player API
        # in `--headless=new`. Headed under xvfb is the reliable path.
        env:
          HEADLESS: '0'
        run: |
          CHROME_BIN=$(node -p "require('playwright').chromium.executablePath()")
          echo "Using $CHROME_BIN"
          xvfb-run -a --server-args="-screen 0 1280x800x24" \
            env CHROME_BIN="$CHROME_BIN" pnpm test:e2e:full
        timeout-minutes: 20

  release:
    name: release (tag + zips)
    runs-on: ubuntu-latest
    needs: [build, smoke, e2e]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 11.5.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Resolve version + skip if tag exists
        id: ver
        run: |
          VERSION=$(jq -r .version package.json)
          TAG="v$VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          elif gh release view "$TAG" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Build zips
        if: steps.ver.outputs.exists == 'false'
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          pnpm zip
          pnpm zip:firefox
          # Firefox/Zen treat .xpi as installable; .zip downloads as a file.
          # Same bytes, different filename → user can install via drag-drop
          # into about:addons.
          cp ".output/dont-censor-explicit-songs-${VERSION}-firefox.zip" \
             ".output/dont-censor-explicit-songs-${VERSION}-firefox.xpi"
          ls .output/dont-censor-explicit-songs-${VERSION}*
      - name: Create tag + release
        if: steps.ver.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.ver.outputs.tag }}
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          git tag "$TAG"
          git push origin "$TAG"
          gh release create "$TAG" \
            --title "$TAG" \
            --notes "Built from ${GITHUB_SHA::7}. See README for install instructions — Firefox/Zen need temporary load via about:debugging (unsigned XPI)." \
            .output/dont-censor-explicit-songs-${VERSION}-chrome.zip \
            .output/dont-censor-explicit-songs-${VERSION}-firefox.xpi \
            .output/dont-censor-explicit-songs-${VERSION}-firefox.zip \
            .output/dont-censor-explicit-songs-${VERSION}-sources.zip
